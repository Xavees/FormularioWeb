<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario usando TS</title>
    <link rel="stylesheet" href="../CSS/formulario.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>




<div class="box">



    <h2>Cadastro</h2>
    <form action="../php/process.php" method="post" id="formCadastro">
        <div class="mb-2">
            <input type="text" name="nome" id="nomeDigitado" class="form-control" placeholder="Nome completo">
        </div>
        <div class="mb-2">
            <input type="email" name="email" id="emailDigitado" class="form-control" placeholder="E-mail">
        </div>
        <div class="mb-2">
            <input type="text" name="endereco" id="enderecoDigitado" class="form-control" placeholder="Endereço">
        </div>
        <button type="submit" class="btn w-100" onclick="return validarFormulario()">Cadastrar</button>
    </form>

    <div class="divisor"></div>

   



    <h2>Consulta</h2>
    <form id="consultaForm" method="post">
        <div class="mb-2">
            <input type="email" id="emailBusca" class="form-control" placeholder="Digite seu e-mail" required>
        </div>
        <button type="submit" id="btnConsultar" class="btn w-100">Consultar</button>
    </form>

    



    <div id="tabelaResultado">
        <table class="table table-bordered table-sm mt-3">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Email</th>
                    <th>Endereço</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td id="col-id"></td>
                    <td id="col-nome"></td>
                    <td id="col-email"></td>
                    <td id="col-endereco"></td>
                </tr>
            </tbody>
        </table>
    </div>

</div>



<script type="module" src="../build/formulario.js"></script>










    
</body>
</html>
